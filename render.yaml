services:
  - type: web
    name: newshades-salon
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker --workers 1 --timeout 120 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: FLASK_DEBUG
        value: "false"
      - key: MAINTENANCE_OVERRIDE
        value: "off"
      - key: DATABASE_URL
        fromDatabase:
          name: newshades-db
          property: connectionString

databases:
  - name: newshades-db
    databaseName: salon_db
    plan: free
