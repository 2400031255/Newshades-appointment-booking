<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Server Error – New Shades</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:24px 20px;font-family:'DM Sans',sans-serif;
      background:radial-gradient(ellipse at 50% 30%,#1a0a0a 0%,#120808 30%,#0c0b10 65%,#080710 100%);
      color:#f0e6d3;
    }
    .orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(70px);opacity:0.28;}
    .orb-1{width:min(420px,80vw);height:min(420px,80vw);top:-120px;right:-100px;
            background:radial-gradient(circle,rgba(226,93,93,0.55),transparent 65%);}
    .orb-2{width:min(300px,70vw);height:min(300px,70vw);bottom:-80px;left:-80px;
            background:radial-gradient(circle,rgba(226,93,93,0.3),transparent 65%);}
    .wrap{position:relative;z-index:1;text-align:center;max-width:480px;
          animation:fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    .num{
      font-family:'Playfair Display',serif;
      font-size:clamp(6rem,20vw,10rem);font-weight:700;line-height:1;
      background:linear-gradient(135deg,#ff9a9a,#e25d5d);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin-bottom:12px;
    }
    h1{font-family:'Playfair Display',serif;color:#fff;font-size:clamp(1.4rem,3vw,1.9rem);margin-bottom:10px;}
    p{color:rgba(240,230,211,0.58);font-size:0.95rem;line-height:1.7;margin-bottom:32px;}
    .btn{
      display:inline-flex;align-items:center;gap:9px;
      padding:13px 32px;border-radius:999px;
      background:linear-gradient(135deg,#e8c96a,#c9a84c);
      color:#120e08;font-weight:700;font-size:0.95rem;
      text-decoration:none;border:none;cursor:pointer;
      box-shadow:0 12px 32px rgba(201,168,76,0.32);
      transition:transform 0.2s,box-shadow 0.2s;
    }
    .btn:hover{transform:translateY(-2px);box-shadow:0 18px 40px rgba(201,168,76,0.45);}
    .retry{
      display:inline-flex;align-items:center;gap:9px;
      padding:12px 28px;border-radius:999px;margin-left:12px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      color:rgba(240,230,211,0.8);font-weight:600;font-size:0.93rem;
      text-decoration:none;cursor:pointer;
      transition:all 0.2s;
    }
    .retry:hover{background:rgba(255,255,255,0.1);color:#fff;}
    .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="wrap">
    <div class="num">500</div>
    <h1>Something Went Wrong</h1>
    <p>We're experiencing a technical issue.<br>Please try again in a moment.</p>
    <div class="actions">
      <a href="javascript:location.reload()" class="retry"><i class="fas fa-redo"></i> Try Again</a>
      <a href="/" class="btn"><i class="fas fa-home"></i> Go Home</a>
    </div>
  </div>
</body>
</html>
