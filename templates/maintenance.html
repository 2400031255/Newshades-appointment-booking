<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Under Maintenance – New Shades</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
      font-family: 'DM Sans', sans-serif;
      background: #0e0d12;
      color: #f0e6d3;
    }
    .card {
      width: min(100%, 400px);
      padding: 44px 32px 36px;
      background: #1a1820;
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 24px;
      box-shadow: 0 32px 64px rgba(0,0,0,0.6);
      text-align: center;
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .brand {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 32px;
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; font-weight: 700; color: #fff;
    }
    .brand-name span { color: #C9A84C; }
    .brand-luxe {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.18em;
      color: rgba(201,168,76,0.6);
      border: 1px solid rgba(201,168,76,0.28);
      padding: 2px 6px; border-radius: 4px;
    }
    .icon-wrap {
      width: 76px; height: 76px; border-radius: 50%;
      background: rgba(201,168,76,0.10);
      border: 1.5px solid rgba(201,168,76,0.22);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 1.75rem; color: #C9A84C;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.35rem, 5vw, 1.65rem);
      color: #fff; font-weight: 700;
      line-height: 1.3; margin-bottom: 12px;
    }
    p {
      color: rgba(240,230,211,0.55);
      font-size: 0.9rem; line-height: 1.65;
      margin-bottom: 28px;
    }
    .btn-wa {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px 20px; border-radius: 12px; border: none;
      background: #25d366; color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem; font-weight: 700;
      text-decoration: none; cursor: pointer;
      transition: filter 0.2s;
      margin-bottom: 10px;
    }
    .btn-wa:hover { filter: brightness(1.1); color: #fff; }
    .btn-login {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 13px 20px; border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      color: rgba(240,230,211,0.8);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      margin-bottom: 20px;
    }
    .btn-login:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(201,168,76,0.3);
      color: #E8C96A;
    }
    .phone {
      font-size: 1rem; font-weight: 700;
      color: #C9A84C; letter-spacing: 0.04em;
      margin-bottom: 16px;
    }
    .phone a { color: inherit; text-decoration: none; }
    .phone a:hover { color: #E8C96A; }
    .note { font-size: 0.73rem; color: rgba(240,230,211,0.28); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="brand-name"><span>New</span> Shades</span>
      <span class="brand-luxe">SALON</span>
    </div>

    <div class="icon-wrap">
      <i class="fas fa-tools"></i>
    </div>

    <h1>Website is under<br>maintenance</h1>
    <p>We'll be back shortly. For bookings and enquiries, reach us on WhatsApp.</p>

    {% if whatsapp %}
    <a href="https://wa.me/{{ whatsapp }}" class="btn-wa" target="_blank" rel="noopener noreferrer">
      <i class="fab fa-whatsapp" style="font-size:1.2rem;"></i> Chat on WhatsApp
    </a>
    {% endif %}

    <a href="/login" class="btn-login">
      <i class="fas fa-sign-in-alt"></i> Login
    </a>

    <div class="note">Admin can turn this off from the Maintenance tab.</div>
  </div>
</body>
</html>
