<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Under Maintenance – New Shades</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
      font-family: 'DM Sans', sans-serif;
      background: radial-gradient(ellipse at 50% 30%, #1e1500 0%, #120e00 30%, #0c0b10 65%, #080710 100%);
      color: #f0e6d3;
    }

    /* floating gold orbs */
    .orb {
      position: fixed; border-radius: 50%; pointer-events: none;
      filter: blur(60px); opacity: 0.35;
    }
    .orb-1 { width: min(400px,80vw); height: min(400px,80vw); top: -100px; right: -100px;
              background: radial-gradient(circle, rgba(201,168,76,0.5), transparent 65%); }
    .orb-2 { width: min(300px,70vw); height: min(300px,70vw); bottom: -80px; left: -80px;
              background: radial-gradient(circle, rgba(201,168,76,0.3), transparent 65%); }

    .card {
      position: relative; z-index: 1;
      width: min(100%, 420px);
      padding: 44px 36px 40px;
      background: linear-gradient(145deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
      border: 1px solid rgba(201,168,76,0.22);
      border-radius: 28px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.55);
      backdrop-filter: blur(20px);
      text-align: center;
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* brand */
    .brand {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 28px;
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem; font-weight: 700;
    }
    .brand-name span { color: #C9A84C; }
    .brand-luxe {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.18em;
      color: rgba(201,168,76,0.6);
      border: 1px solid rgba(201,168,76,0.3);
      padding: 2px 7px; border-radius: 4px;
      align-self: center;
    }

    /* icon */
    .icon-wrap {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(201,168,76,0.10);
      border: 1.5px solid rgba(201,168,76,0.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 1.8rem; color: #C9A84C;
      animation: iconPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
    }
    @keyframes iconPop {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 5vw, 1.75rem);
      color: #fff; margin-bottom: 12px;
    }
    p {
      color: rgba(240,230,211,0.62);
      font-size: 0.92rem; line-height: 1.65;
      margin-bottom: 28px;
    }

    /* buttons */
    .btn-wa {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px 20px; border-radius: 999px; border: none;
      background: #25d366; color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem; font-weight: 700;
      text-decoration: none; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 10px 28px rgba(37,211,102,0.3);
      margin-bottom: 12px;
    }
    .btn-wa:hover { transform: translateY(-2px); box-shadow: 0 16px 36px rgba(37,211,102,0.42); color: #fff; }

    .btn-login {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 13px 20px; border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(240,230,211,0.85);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      margin-bottom: 20px;
    }
    .btn-login:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(201,168,76,0.35);
      color: #E8C96A;
    }

    .phone {
      font-size: 1rem; font-weight: 700;
      color: #C9A84C; letter-spacing: 0.04em;
      margin-bottom: 16px;
    }
    .phone a { color: inherit; text-decoration: none; }
    .phone a:hover { color: #E8C96A; }

    .note {
      font-size: 0.75rem;
      color: rgba(240,230,211,0.3);
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <div class="brand">
      <span class="brand-name"><span>New</span> Shades</span>
      <span class="brand-luxe">SALON</span>
    </div>

    <div class="icon-wrap">
      <i class="fas fa-tools"></i>
    </div>

    <h1>Website is under<br>maintenance</h1>
    <p>We're making some improvements.<br>For bookings and enquiries, please reach us on WhatsApp.</p>

    {% if whatsapp %}
    <a href="https://wa.me/{{ whatsapp }}" class="btn-wa" target="_blank" rel="noopener noreferrer">
      <i class="fab fa-whatsapp" style="font-size:1.2rem;"></i> Text Us on WhatsApp
    </a>
    {% endif %}

    <a href="/login" class="btn-login">
      <i class="fas fa-sign-in-alt"></i> Login
    </a>

    {% if phone %}
    <div class="phone"><a href="tel:{{ phone }}">+{{ phone }}</a></div>
    {% endif %}

    <div class="note">Admin can turn this off from the Maintenance tab in Settings.</div>
  </div>
</body>
</html>
